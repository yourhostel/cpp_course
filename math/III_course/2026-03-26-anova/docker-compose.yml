version: "3.9"

services:
  postgres:
    image: postgres:17.7-bookworm
    container_name: ${POSTGRES_DB}
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata

    ports:
      - "${HOST_PORT}:5432"

    volumes:
      - data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      # Використовується команда pg_isready для перевірки готовності PostgreSQL приймати підключення
      # CMD-SHELL означає виконання рядка через shell всередині контейнера
      # pg_isready утиліта PostgreSQL для перевірки доступності сервера без встановлення повноцінного з'єднання.
      # Параметр -U adm задає користувача від імені якого виконується перевірка. Це має відповідати POSTGRES_USER.
      # Параметр -d nova-db задає базу даних до якої виконується перевірка. Вона повинна існувати в контейнері.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      # Інтервал між перевірками 10 секунд
      interval: 10s
      # Максимальний час очікування відповіді 5 секунд
      timeout: 5s
      # Кількість невдалих спроб перед позначенням контейнера як unhealthy
      retries: 5

volumes:
  data: